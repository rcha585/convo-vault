<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Export ChatGPT</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup">
      <h1>ChatGPT Exporter</h1>
      <button id="exportButton" type="button">Export</button>
      <section class="settings" aria-label="Local backend settings">
        <h2>Local setup</h2>
        <label class="field">
          <span>Backend folder</span>
          <input id="backendRootInput" type="text" placeholder="Path containing scripts folder">
        </label>
        <div class="field-row">
          <label class="field">
            <span>Port</span>
            <input id="portInput" type="number" min="1024" max="65535" step="1">
          </label>
          <label class="field">
            <span>Cache folder</span>
            <input id="cacheDirInput" type="text" placeholder="%LOCALAPPDATA%\ChatGPTConversationExporter">
          </label>
        </div>
        <label class="field">
          <span>Browser path</span>
          <input id="browserPathInput" type="text" placeholder="Optional chrome.exe or msedge.exe">
        </label>
        <div class="settings-actions">
          <button id="saveSettingsButton" class="secondary" type="button">Save</button>
          <button id="resetSettingsButton" class="secondary" type="button">Reset</button>
        </div>
      </section>
      <section class="backend" aria-label="Local renderer controls">
        <div class="backend-status">
          <span id="backendDot" class="backend-dot" aria-hidden="true"></span>
          <span id="backendStatus">Checking local renderer...</span>
        </div>
        <div class="backend-actions">
          <button id="checkBackendButton" class="secondary" type="button">Check</button>
          <button id="copyStartButton" class="secondary" type="button">Copy Start</button>
          <button id="stopBackendButton" class="danger" type="button" disabled>Stop</button>
        </div>
      </section>
      <p id="status" class="status" role="status" aria-live="polite"></p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>

name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    name: Verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install PDF backend dependencies
        working-directory: tools/advanced-pdf
        run: pnpm install --frozen-lockfile

      - name: Check syntax and JSON
        run: npm run check

      - name: Run tests
        run: npm test

      - name: Build extension package
        run: npm run build:extension
